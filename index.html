<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>System Breach</title>
<style>
body {
  margin: 0;
  background-color: #000;
  color: #00FF00;
  font-family: 'Courier New', monospace;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

#terminal {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  padding: 20px;
  overflow: hidden;
}

.line {
  font-size: 18px;
  opacity: 0;
  animation: fadein 0.5s forwards;
}

@keyframes fadein {
  to {opacity: 1;}
}

#scareImage {
  position: absolute;
  width: 500px;
  max-width: 80%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: opacity 0.5s;
  border: 3px solid red;
  border-radius: 12px;
  box-shadow: 0 0 40px red;
}

#aprilFools {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: Impact, monospace;
  font-size: 50px;
  color: red;
  text-align: center;
}
</style>
</head>
<body>

<div id="terminal"></div>
<img id="scareImage" src="img1.jpg" alt="Scary">
<div id="aprilFools">APRIL FOOLS!</div>

<script>
const terminal = document.getElementById('terminal');
const scareImage = document.getElementById('scareImage');
const aprilFools = document.getElementById('aprilFools');

const lines = [
  "Customer data compiling...",
  "Remote access granted...",
  "Encrypting personal files...",
  "Monitoring system activity...",
  "Thank you for access.",
  "We appreciate your help.",
  "Initiating deep scan...",
  "Unauthorized activity detected...",
  "All connections tracked...",
  "System breach completed..."
];

let index = 0;

function showNextLine() {
  if(index >= lines.length){
    // Clear screen, wait 2.5s, then show APRIL FOOLS
    setTimeout(()=>{
      terminal.innerHTML = "";
      scareImage.style.opacity = 0;
      setTimeout(()=>{
        aprilFools.style.display = "block";
      },2500);
    },500);
    return;
  }

  const lineDiv = document.createElement('div');
  lineDiv.className = 'line';
  lineDiv.textContent = lines[index];
  terminal.appendChild(lineDiv);

  // occasionally show scare image with jitter
  if(Math.random() < 0.6){
    scareImage.style.opacity = 1;
    scareImage.style.top = (50 + (Math.random()*20 - 10)) + "%";
    scareImage.style.left = (50 + (Math.random()*20 - 10)) + "%";
    setTimeout(()=> scareImage.style.opacity = 0, 800);
  }

  index++;
  setTimeout(showNextLine, 1200); // one line every 1.2s
}

// Start sequence
setTimeout(showNextLine, 1000);

</script>

</body>
</html>
